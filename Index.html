<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETMAX - Gestão Inteligente</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding: 20px; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        button.nav-btn { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: var(--primary); color: white; }
        .tab-content { display: none; max-width: 1100px; margin: 0 auto; background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .active { display: block; }
        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .calendar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; border: 1px solid #ddd; }
        .calendar-header { background: var(--primary); color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 0.8em; }
        .day { background: white; min-height: 110px; padding: 5px; }
        .day-number { font-weight: bold; margin-bottom: 5px; color: #bdc3c7; }
        .task { background: #e1f5fe; border-left: 3px solid var(--accent); font-size: 10px; padding: 2px 4px; margin-bottom: 2px; border-radius: 2px; overflow: hidden; text-overflow: ellipsis; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-save { background: #27ae60; color: white; width: 100%; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .multi-days { display: flex; flex-wrap: wrap; gap: 10px; background: #f9f9f9; padding: 10px; border-radius: 4px; }
        .list-item { background: #fff; border: 1px solid #eee; margin-bottom: 10px; padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 8px; border-radius: 3px; cursor: pointer; margin-right: 5px;}
        .btn-del { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 3px; cursor: pointer; }
        
        @media print {
            .nav-btn, #aba-lancamento, .calendar-controls, .btn-del, .btn-edit { display: none !important; }
            @page { size: A4 landscape; margin: 0.5cm; }
            .day { min-height: 130px; }
        }
    </style>
</head>
<body>

    <h1>🐾 VETMAX</h1>
    <nav>
        <button class="nav-btn" onclick="showTab('aba-calendario')">📅 Calendário</button>
        <button class="nav-btn" onclick="showTab('aba-lancamento')">📝 Lançamentos (Agrupados)</button>
        <button class="nav-btn" onclick="window.print()">🖨️ Imprimir</button>
    </nav>

    <div id="aba-calendario" class="tab-content active">
        <div class="calendar-controls">
            <h3 id="month-display">Mês Ano</h3>
            <div>
                <select id="select-month" onchange="changeDate()"></select>
                <select id="select-year" onchange="changeDate()"></select>
            </div>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="aba-lancamento" class="tab-content">
        <h3 id="form-title">Configurar Atividade</h3>
        <input type="hidden" id="edit-id">
        
        <div class="form-group">
            <label>Nome da Atividade</label>
            <input type="text" id="task-name" maxlength="20" placeholder="Ex: Limpeza de Ar">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="form-group">
                <label>Início da Regra (Data)</label>
                <input type="date" id="task-date">
            </div>
            <div class="form-group">
                <label>Horário</label>
                <input type="time" id="task-time">
            </div>
        </div>

        <div class="form-group">
            <label>Dias da Semana (A atividade aparecerá nestes dias todo mês)</label>
            <div class="multi-days">
                <label><input type="checkbox" class="repeat-day" value="0"> Dom</label>
                <label><input type="checkbox" class="repeat-day" value="1"> Seg</label>
                <label><input type="checkbox" class="repeat-day" value="2"> Ter</label>
                <label><input type="checkbox" class="repeat-day" value="3"> Qua</label>
                <label><input type="checkbox" class="repeat-day" value="4"> Qui</label>
                <label><input type="checkbox" class="repeat-day" value="5"> Sex</label>
                <label><input type="checkbox" class="repeat-day" value="6"> Sáb</label>
            </div>
        </div>

        <button class="btn-save" id="btn-save" onclick="saveTask()">Confirmar Atividade</button>
        <button class="btn-del" id="btn-cancel-edit" style="display:none; width:100%; margin-top:10px;" onclick="resetForm()">Cancelar Edição</button>

        <hr style="margin: 30px 0;">
        <h3>Suas Regras de Atividades</h3>
        <div id="task-list"></div>
    </div>

    <script>
        // Agora o dado é salvo como uma "Regra" e não como dias soltos
        let rules = JSON.parse(localStorage.getItem('vetmax_rules')) || [];
        let currentViewDate = new Date();
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        const daysWeek = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

        function initSelectors() {
            const mSel = document.getElementById('select-month');
            const ySel = document.getElementById('select-year');
            months.forEach((m, i) => mSel.innerHTML += `<option value="${i}" ${i === currentViewDate.getMonth() ? 'selected' : ''}>${m}</option>`);
            for(let y = 2025; y <= 2027; y++) ySel.innerHTML += `<option value="${y}" ${y === currentViewDate.getFullYear() ? 'selected' : ''}>${y}</option>`;
        }

        function changeDate() {
            currentViewDate = new Date(document.getElementById('select-year').value, document.getElementById('select-month').value, 1);
            renderCalendar();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'aba-calendario') renderCalendar();
            renderTaskList();
        }

        function saveTask() {
            const name = document.getElementById('task-name').value;
            const startDate = document.getElementById('task-date').value;
            const time = document.getElementById('task-time').value;
            const days = Array.from(document.querySelectorAll('.repeat-day:checked')).map(cb => parseInt(cb.value));
            const editId = document.getElementById('edit-id').value;

            if(!name || !startDate || !time) return alert("Preencha os campos!");

            const newRule = { id: editId ? parseInt(editId) : Date.now(), name, startDate, time, days };

            if(editId) {
                const idx = rules.findIndex(r => r.id == editId);
                rules[idx] = newRule;
            } else {
                rules.push(newRule);
            }

            localStorage.setItem('vetmax_rules', JSON.stringify(rules));
            resetForm();
            renderTaskList();
            alert("Regra de atividade salva!");
        }

        function editTask(id) {
            const rule = rules.find(r => r.id === id);
            document.getElementById('task-name').value = rule.name;
            document.getElementById('task-date').value = rule.startDate;
            document.getElementById('task-time').value = rule.time;
            document.getElementById('edit-id').value = rule.id;
            
            document.querySelectorAll('.repeat-day').forEach(cb => {
                cb.checked = rule.days.includes(parseInt(cb.value));
            });

            document.getElementById('form-title').innerText = "Editando Regra";
            document.getElementById('btn-save').innerText = "Salvar Alterações em Todos os Dias";
            document.getElementById('btn-cancel-edit').style.display = "block";
            showTab('aba-lancamento');
        }

        function deleteTask(id) {
            if(confirm("Isso excluirá esta atividade de TODOS os dias do calendário. Confirmar?")) {
                rules = rules.filter(r => r.id !== id);
                localStorage.setItem('vetmax_rules', JSON.stringify(rules));
                renderTaskList();
            }
        }

        function resetForm() {
            document.getElementById('task-name').value = '';
            document.getElementById('task-date').value = '';
            document.getElementById('task-time').value = '';
            document.getElementById('edit-id').value = '';
            document.querySelectorAll('.repeat-day').forEach(cb => cb.checked = false);
            document.getElementById('form-title').innerText = "Configurar Atividade";
            document.getElementById('btn-save').innerText = "Confirmar Atividade";
            document.getElementById('btn-cancel-edit').style.display = "none";
        }

        function renderTaskList() {
            const list = document.getElementById('task-list');
            list.innerHTML = rules.map(r => `
                <div class="list-item">
                    <div>
                        <strong>${r.name}</strong><br>
                        <small>Horário: ${r.time}h | Dias: ${r.days.length > 0 ? r.days.map(d => daysWeek[d]).join(', ') : 'Data Única'}</small>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="editTask(${r.id})">✏️ Editar</button>
                        <button class="btn-del" onclick="deleteTask(${r.id})">🗑️ Excluir Regra</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('month-display').innerText = `${months[month]} de ${year}`;

            ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].forEach(d => cal.innerHTML += `<div class="calendar-header">${d}</div>`);

            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for(let i=0; i < firstDay; i++) cal.innerHTML += `<div class="day"></div>`;

            for(let day=1; day <= totalDays; day++) {
                const dateObj = new Date(year, month, day);
                const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = dateObj.getDay();

                // Filtrar regras que se aplicam a este dia
                const dayTasks = rules.filter(r => {
                    // Se for a data exata da regra
                    if(r.startDate === dateStr) return true;
                    // Se o dia da semana estiver na regra E a data atual for depois da data de início
                    return r.days.includes(dayOfWeek) && dateStr >= r.startDate;
                }).sort((a,b) => a.time.localeCompare(b.time));

                let htmlDay = `<div class="day"><div class="day-number">${day}</div>`;
                dayTasks.forEach(t => {
                    htmlDay += `<div class="task">${t.time} ${t.name}</div>`;
                });
                htmlDay += `</div>`;
                cal.innerHTML += htmlDay;
            }
        }

        initSelectors();
        renderCalendar();
        renderTaskList();
    </script>
</body>
</html>
