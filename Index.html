<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETMAX - Gestão de Limpeza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --fc-border-color: #e2e8f0; --fc-button-bg-color: #0891b2; }
        .fc-event { cursor: pointer; border: none; padding: 4px; font-size: 0.8em; border-radius: 6px; }
        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 800; text-transform: capitalize; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-cyan-700 p-4 text-white shadow-xl mb-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter">VET<span class="text-cyan-300">MAX</span></h1>
            <button onclick="switchTab('lancamento')" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-black shadow-md hover:bg-emerald-600 transition">+ NOVO</button>
        </div>
    </nav>

    <main class="container mx-auto p-2">
        <section id="tab-consulta" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div id="calendar"></div>
        </section>

        <section id="tab-lancamento" class="hidden max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-2xl border border-slate-100">
            <h2 id="formTitle" class="text-2xl font-black mb-6 text-cyan-700 text-center">Registrar Atividade</h2>
            <form id="limpezaForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-sm font-bold mb-1">O que será limpo?</label>
                    <input type="text" id="taskTitle" class="w-full p-3 bg-slate-50 border rounded-xl outline-none" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Início</label>
                        <input type="time" id="taskStart" class="w-full p-3 bg-slate-50 border rounded-xl" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Fim</label>
                        <input type="time" id="taskEnd" class="w-full p-3 bg-slate-50 border rounded-xl" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Repetir nos dias:</label>
                    <div class="grid grid-cols-4 gap-2">
                        <label class="flex items-center justify-center text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer"><input type="checkbox" name="dow" value="1" class="mr-1"> SEG</label>
                        <label class="flex items-center justify-center text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer"><input type="checkbox" name="dow" value="2" class="mr-1"> TER</label>
                        <label class="flex items-center justify-center text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer"><input type="checkbox" name="dow" value="3" class="mr-1"> QUA</label>
                        <label class="flex items-center justify-center text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer"><input type="checkbox" name="dow" value="4" class="mr-1"> QUI</label>
                        <label class="flex items-center justify-center text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer"><input type="checkbox" name="dow" value="5" class="mr-1"> SEX</label>
                        <label class="flex items-center justify-center text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer"><input type="checkbox" name="dow" value="6" class="mr-1"> SAB</label>
                        <label class="flex items-center justify-center text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer"><input type="checkbox" name="dow" value="0" class="mr-1"> DOM</label>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="resetAndBack()" class="flex-1 py-3 bg-slate-200 rounded-xl font-black">VOLTAR</button>
                    <button type="submit" class="flex-1 py-3 bg-cyan-600 text-white rounded-xl font-black shadow-lg">SALVAR</button>
                </div>
                <button type="button" id="btnExcluir" onclick="deleteEvent()" class="hidden w-full mt-2 py-2 text-red-500 font-bold text-xs underline">Excluir Atividade</button>
            </form>
        </section>
    </main>

    <div id="eventModal" class="hidden fixed inset-0 bg-black/50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center">
            <h3 id="modalEventTitle" class="text-xl font-bold mb-4">O que deseja fazer?</h3>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="toggleStatus()" class="py-3 bg-emerald-500 text-white rounded-xl font-bold">Alternar Status (OK/Pendente)</button>
                <button onclick="prepareEdit()" class="py-3 bg-cyan-600 text-white rounded-xl font-bold">Editar Detalhes</button>
                <button onclick="closeModal()" class="py-3 bg-slate-100 rounded-xl font-bold text-slate-500">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        let calendar;
        let selectedEvent = null;
        const storageKey = 'vetmax_events_v3';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const savedEvents = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'pt-br',
                slotMinTime: '07:00:00',
                slotMaxTime: '20:00:00',
                allDaySlot: false,
                headerToolbar: { left: 'prev,next hoje', center: 'title', right: 'timeGridWeek,dayGridMonth' },
                events: savedEvents,
                eventClick: function(info) {
                    selectedEvent = info.event;
                    document.getElementById('modalEventTitle').innerText = selectedEvent.title;
                    document.getElementById('eventModal').classList.add('modal-active');
                }
            });
            calendar.render();
        });

        function switchTab(tab) {
            document.getElementById('tab-consulta').classList.toggle('hidden', tab !== 'consulta');
            document.getElementById('tab-lancamento').classList.toggle('hidden', tab !== 'lancamento');
            if(tab === 'consulta') setTimeout(() => calendar.render(), 50);
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('modal-active');
        }

        function toggleStatus() {
            const newColor = selectedEvent.backgroundColor === '#10b981' ? '#f59e0b' : '#10b981';
            selectedEvent.setProp('backgroundColor', newColor);
            saveToLocal();
            closeModal();
        }

        function prepareEdit() {
            closeModal();
            const e = selectedEvent;
            document.getElementById('editId').value = e.id;
            document.getElementById('taskTitle').value = e.title;
            
            // Pega horários
            const startStr = e.startStr.split('T')[1]?.substring(0,5) || e._def.recurringDef?.typeData?.startTime?.milliseconds; // simplificado
            document.getElementById('taskStart').value = startStr || "";
            
            document.getElementById('formTitle').innerText = "Editar Atividade";
            document.getElementById('btnExcluir').classList.remove('hidden');
            switchTab('lancamento');
        }

        function deleteEvent() {
            if(confirm("Tem certeza que deseja excluir esta atividade?")) {
                selectedEvent.remove();
                saveToLocal();
                resetAndBack();
            }
        }

        function resetAndBack() {
            document.getElementById('limpezaForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('formTitle').innerText = "Registrar Atividade";
            document.getElementById('btnExcluir').classList.add('hidden');
            switchTab('consulta');
        }

        document.getElementById('limpezaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const dows = Array.from(document.querySelectorAll('input[name="dow"]:checked')).map(el => el.value);
            
            const eventData = {
                title: document.getElementById('taskTitle').value,
                startTime: document.getElementById('taskStart').value,
                endTime: document.getElementById('taskEnd').value,
                daysOfWeek: dows.length > 0 ? dows : null,
                backgroundColor: '#f59e0b'
            };

            if (editId) {
                calendar.getEventById(editId).remove();
            }

            calendar.addEvent({ id: editId || Date.now().toString(), ...eventData });
            saveToLocal();
            resetAndBack();
        });

        function saveToLocal() {
            const events = calendar.getEvents().map(e => ({
                id: e.id,
                title: e.title,
                start: e.startStr,
                end: e.endStr,
                startTime: e.startStr.includes('T') ? e.startStr.split('T')[1].substring(0,5) : (e._def.recurringDef?.typeData?.startTime ? "08:00" : null),
                daysOfWeek: e._def.recurringDef?.typeData?.daysOfWeek || null,
                backgroundColor: e.backgroundColor
            }));
            localStorage.setItem(storageKey, JSON.stringify(events));
        }
    </script>
</body>
</html>
