<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETMAX - Gestão de Limpeza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --fc-border-color: #e2e8f0; --fc-button-bg-color: #0891b2; --fc-button-active-bg-color: #0e7490; }
        .fc-event { cursor: pointer; border: none; padding: 4px; font-size: 0.8em; border-radius: 6px; }
        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 800; color: #1e293b; text-transform: capitalize; }
        .fc-timegrid-slot { height: 3em !important; }

        /* Ajustes de Impressão */
        @media print {
            .no-print, nav, #tab-lancamento, .bg-slate-100 { display: none !important; }
            #tab-consulta { display: block !important; width: 100% !important; border: none !important; padding: 0 !important; }
            .fc-header-toolbar { margin-bottom: 10px !important; }
            .fc-event { border: 1px solid #000 !important; color: black !important; background: white !important; }
            .fc-event-dot { border-color: black !important; }
            @page { size: landscape; margin: 0.5cm; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="no-print bg-cyan-700 p-4 text-white shadow-xl mb-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter italic text-white">VET<span class="text-cyan-300">MAX</span></h1>
            <div class="flex gap-2">
                <button onclick="switchTab('consulta')" class="text-sm font-bold bg-cyan-800 px-3 py-2 rounded-lg hover:bg-cyan-900 transition">Ver Agenda</button>
                <button onclick="switchTab('lancamento')" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-black shadow-md hover:bg-emerald-600 transition">+ NOVO</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-2 md:p-4">
        
        <section id="tab-consulta" class="bg-white p-3 md:p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="no-print flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-3">
                <div>
                    <h2 class="text-lg font-bold text-slate-700">Cronograma de Higienização</h2>
                    <p class="text-xs text-slate-500 font-medium italic">Clique na atividade para marcar como concluída</p>
                </div>
                <div class="flex gap-3 bg-slate-100 p-2 rounded-xl">
                    <span class="flex items-center text-[10px] font-bold"><span class="w-3 h-3 bg-amber-500 rounded-full mr-1"></span> AGUARDANDO</span>
                    <span class="flex items-center text-[10px] font-bold"><span class="w-3 h-3 bg-emerald-500 rounded-full mr-1"></span> FINALIZADO</span>
                    <button onclick="window.print()" class="ml-2 bg-slate-800 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase">🖨️ Imprimir</button>
                </div>
            </div>
            <div id="calendar"></div>
        </section>

        <section id="tab-lancamento" class="hidden max-w-xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-black mb-6 text-cyan-700 text-center border-b pb-4">Registrar Atividade</h2>
            <form id="limpezaForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-1 text-slate-600">Ambiente ou Sala</label>
                    <input type="text" id="taskTitle" placeholder="Ex: Recepção, Canil Interno..." class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none" required>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1 text-slate-600">Início</label>
                        <input type="time" id="taskStart" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-slate-600">Fim</label>
                        <input type="time" id="taskEnd" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-600">Dias de Recorrência:</label>
                    <div class="grid grid-cols-4 gap-2">
                        <label class="day-check"><input type="checkbox" name="dow" value="1"> SEG</label>
                        <label class="day-check"><input type="checkbox" name="dow" value="2"> TER</label>
                        <label class="day-check"><input type="checkbox" name="dow" value="3"> QUA</label>
                        <label class="day-check"><input type="checkbox" name="dow" value="4"> QUI</label>
                        <label class="day-check"><input type="checkbox" name="dow" value="5"> SEX</label>
                        <label class="day-check"><input type="checkbox" name="dow" value="6"> SAB</label>
                        <label class="day-check"><input type="checkbox" name="dow" value="0"> DOM</label>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="switchTab('consulta')" class="flex-1 py-3 bg-slate-200 rounded-xl font-black text-slate-600">CANCELAR</button>
                    <button type="submit" class="flex-1 py-3 bg-cyan-600 text-white rounded-xl font-black shadow-lg hover:bg-cyan-700">SALVAR</button>
                </div>
            </form>
        </section>
    </main>

    <style>
        .day-check { @apply flex items-center justify-center gap-1 text-[10px] font-bold bg-slate-100 p-3 rounded-xl cursor-pointer hover:bg-cyan-50 transition; }
        input[type="checkbox"] { transform: scale(1.2); }
    </style>

    <script>
        let calendar;
        const storageKey = 'vetmax_events_v2';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const savedEvents = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', // Começa no Mês, mas deixa o usuário trocar
                locale: 'pt-br',
                slotMinTime: '07:00:00',
                slotMaxTime: '20:00:00',
                allDaySlot: false,
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,timeGridWeek,timeGridDay' 
                },
                buttonText: { today: 'Hoje', month: 'Mês', week: 'Semana', day: 'Dia' },
                events: savedEvents,
                eventClick: function(info) {
                    // Clique simples alterna entre Laranja (Aguardando) e Verde (Finalizado)
                    const isEmerald = info.event.backgroundColor === '#10b981' || info.event.backgroundColor === 'rgb(16, 185, 129)';
                    const newStatus = isEmerald ? 'AGUARDANDO' : 'FINALIZADO';
                    const newColor = isEmerald ? '#f59e0b' : '#10b981';

                    if (confirm(`Mudar "${info.event.title}" para ${newStatus}?`)) {
                        info.event.setProp('backgroundColor', newColor);
                        saveToLocal();
                    }
                }
            });
            calendar.render();
        });

        function switchTab(tab) {
            document.getElementById('tab-consulta').classList.toggle('hidden', tab !== 'consulta');
            document.getElementById('tab-lancamento').classList.toggle('hidden', tab !== 'lancamento');
            if(tab === 'consulta') {
                setTimeout(() => { calendar.render(); calendar.updateSize(); }, 50);
            }
        }

        document.getElementById('limpezaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const dows = Array.from(document.querySelectorAll('input[name="dow"]:checked')).map(el => parseInt(el.value));
            
            const newEvent = {
                id: Date.now().toString(),
                title: document.getElementById('taskTitle').value,
                backgroundColor: '#f59e0b', // Começa sempre como aguardando
                startTime: document.getElementById('taskStart').value,
                endTime: document.getElementById('taskEnd').value,
                daysOfWeek: dows.length > 0 ? dows : null
            };

            calendar.addEvent(newEvent);
            saveToLocal();
            this.reset();
            switchTab('consulta');
        });

        function saveToLocal() {
            const events = calendar.getEvents().map(e => ({
                id: e.id,
                title: e.title,
                startTime: e._def.recurringDef?.typeData?.startTime ? 
                           new Date(e._def.recurringDef.typeData.startTime.milliseconds).toISOString().substr(11, 5) : null,
                endTime: e._def.recurringDef?.typeData?.endTime ? 
                         new Date(e._def.recurringDef.typeData.endTime.milliseconds).toISOString().substr(11, 5) : null,
                daysOfWeek: e._def.recurringDef?.typeData?.daysOfWeek || null,
                backgroundColor: e.backgroundColor
            }));
            localStorage.setItem(storageKey, JSON.stringify(events));
        }
    </script>
</body>
</html>
