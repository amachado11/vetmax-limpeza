<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETMAX - Mensal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        @page { size: landscape; margin: 0.5cm; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .container { width: 100% !important; max-width: none !important; margin: 0 !important; }
            
            /* Ajusta o calendário para ocupar a folha toda */
            .fc { max-width: 100% !important; height: 90vh !important; }
            .fc-scroller { height: auto !important; overflow: visible !important; }
            
            /* Estilo das tarefas no modo Mês */
            .fc-daygrid-event {
                white-space: normal !important; /* Quebra linha */
                align-items: flex-start !important;
                border: 1px solid black !important;
                background: #f8fafc !important;
                color: black !important;
                font-size: 9px !important; /* Fonte menor para caber no mês */
                margin: 1px 0 !important;
                line-height: 1.1 !important;
            }
            
            .fc-event-time { display: none !important; } /* Esconde o horário repetido no ícone */
            .fc-header-toolbar { margin-bottom: 5px !important; }
            .fc-button-group { display: none !important; }
        }

        .fc-event { cursor: pointer; font-weight: bold; }
        .fc-toolbar-title { font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <header class="no-print bg-slate-800 text-white p-6 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-black mb-4 tracking-tighter italic">VET<span class="text-cyan-400">MAX</span></h1>
            
            <form id="taskForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-700 p-4 rounded-xl border border-slate-600">
                <input type="hidden" id="editId">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold mb-1 uppercase text-slate-400 font-mono">Ambiente / Sala</label>
                    <input type="text" id="title" placeholder="Ex: Limpeza Sala 1" class="w-full p-2 rounded bg-slate-800 border border-slate-500 text-white outline-none" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold mb-1 uppercase text-slate-400 font-mono">Horário</label>
                    <input type="time" id="start" class="w-full p-2 rounded bg-slate-800 border border-slate-500 text-white" required>
                    <input type="hidden" id="end" value="23:59">
                </div>
                <div class="flex items-end gap-2">
                    <button type="submit" id="btnSubmit" class="flex-1 bg-cyan-500 text-slate-900 font-black py-2 rounded">SALVAR</button>
                    <button type="button" id="btnCancel" onclick="resetForm()" class="hidden bg-slate-500 text-white px-3 py-2 rounded text-xs">X</button>
                </div>
                <div class="md:col-span-4 flex flex-wrap gap-4 mt-2 border-t border-slate-600 pt-3">
                    <label class="flex items-center text-xs gap-1 cursor-pointer"><input type="checkbox" name="dow" value="1"> SEG</label>
                    <label class="flex items-center text-xs gap-1 cursor-pointer"><input type="checkbox" name="dow" value="2"> TER</label>
                    <label class="flex items-center text-xs gap-1 cursor-pointer"><input type="checkbox" name="dow" value="3"> QUA</label>
                    <label class="flex items-center text-xs gap-1 cursor-pointer"><input type="checkbox" name="dow" value="4"> QUI</label>
                    <label class="flex items-center text-xs gap-1 cursor-pointer"><input type="checkbox" name="dow" value="5"> SEX</label>
                    <label class="flex items-center text-xs gap-1 cursor-pointer"><input type="checkbox" name="dow" value="6"> SÁB</label>
                    <label class="flex items-center text-xs gap-1 cursor-pointer"><input type="checkbox" name="dow" value="0"> DOM</label>
                </div>
            </form>
        </div>
    </header>

    <main class="container mx-auto p-4">
        <div class="flex justify-between items-center mb-4 no-print">
            <h2 class="font-black text-slate-800">Visualização Mensal</h2>
            <button onclick="window.print()" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-black shadow-lg">
                🖨️ IMPRIMIR MÊS COMPLETO
            </button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-2xl border border-slate-200">
            <div id="calendar"></div>
        </div>
    </main>

    <script>
        let calendar;
        const storageKey = 'vetmax_mensal_v1';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const savedData = JSON.parse(localStorage.getItem(storageKey)) || [];

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', // FORÇA VISÃO MENSAL
                locale: 'pt-br',
                height: 'auto',
                headerToolbar: { left: '', center: 'title', right: '' },
                dayMaxEvents: false, // Mostra TODAS as tarefas no quadrado, sem o "+2 more"
                events: savedData,
                eventClick: function(info) { handleEventClick(info.event); }
            });
            calendar.render();
        });

        function handleEventClick(event) {
            const action = confirm(`"${event.title}"\n\nOK: Editar / Cancelar: Excluir`);
            if (action) {
                document.getElementById('editId').value = event.id;
                document.getElementById('title').value = event.title;
                document.getElementById('start').value = event._def.recurringDef?.typeData?.startTime ? new Date(event._def.recurringDef.typeData.startTime.milliseconds).toISOString().substr(11, 5) : "08:00";
                document.getElementById('btnSubmit').innerText = "ATUALIZAR";
                document.getElementById('btnCancel').classList.remove('hidden');
            } else if(confirm("Remover?")) { event.remove(); save(); }
        }

        function resetForm() {
            document.getElementById('taskForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('btnSubmit').innerText = "SALVAR";
            document.getElementById('btnCancel').classList.add('hidden');
        }

        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const editId = document.getElementById('editId').value;
            const dows = Array.from(document.querySelectorAll('input[name="dow"]:checked')).map(el => parseInt(el.value));
            const eventData = {
                id: editId || Date.now().toString(),
                title: `${document.getElementById('start').value} - ${document.getElementById('title').value}`,
                startTime: document.getElementById('start').value,
                daysOfWeek: dows.length > 0 ? dows : [new Date().getDay()]
            };
            if (editId) { const old = calendar.getEventById(editId); if (old) old.remove(); }
            calendar.addEvent(eventData);
            save();
            resetForm();
        });

        function save() {
            const events = calendar.getEvents().map(e => ({
                id: e.id, title: e.title,
                startTime: e._def.recurringDef?.typeData?.startTime ? new Date(e._def.recurringDef.typeData.startTime.milliseconds).toISOString().substr(11, 5) : "08:00",
                daysOfWeek: e._def.recurringDef?.typeData?.daysOfWeek || null
            }));
            localStorage.setItem(storageKey, JSON.stringify(events));
        }
    </script>
</body>
</html>
