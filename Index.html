<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETMAX - Cronograma de Limpeza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        /* Estilo para Impressão */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .fc-toolbar { margin-bottom: 0 !important; }
            .fc-view-harness { height: auto !important; }
            .container { width: 100% !important; max-width: none !important; margin: 0 !important; }
            .fc-event { border: 1px solid black !important; color: black !important; background: transparent !important; }
        }
        :root { --fc-border-color: #cbd5e1; }
        .fc-toolbar-title { font-weight: 800; color: #334155; }
        .fc-event { padding: 5px; font-weight: 600; cursor: pointer; border-radius: 4px; border: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <header class="no-print bg-slate-800 text-white p-6 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-black mb-4">VET<span class="text-cyan-400">MAX</span> - Gestão de Limpeza</h1>
            
            <form id="taskForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-700 p-4 rounded-xl border border-slate-600">
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold mb-1 uppercase text-slate-400">Ambiente / Tarefa</label>
                    <input type="text" id="title" placeholder="Ex: Higienização Recepção" class="w-full p-2 rounded bg-slate-800 border border-slate-500 text-white outline-none focus:border-cyan-400" required>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1 uppercase text-slate-400">Horário</label>
                    <div class="flex gap-1">
                        <input type="time" id="start" class="w-full p-2 rounded bg-slate-800 border border-slate-500 text-white" required>
                        <input type="time" id="end" class="w-full p-2 rounded bg-slate-800 border border-slate-500 text-white" required>
                    </div>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-black py-2 rounded transition shadow-lg">ADICIONAR</button>
                </div>
                
                <div class="md:col-span-4 flex flex-wrap gap-3 mt-2 border-t border-slate-600 pt-3">
                    <span class="text-xs font-bold text-slate-400 mr-2">REPETIR:</span>
                    <label class="flex items-center text-xs gap-1"><input type="checkbox" name="dow" value="1"> Seg</label>
                    <label class="flex items-center text-xs gap-1"><input type="checkbox" name="dow" value="2"> Ter</label>
                    <label class="flex items-center text-xs gap-1"><input type="checkbox" name="dow" value="3"> Qua</label>
                    <label class="flex items-center text-xs gap-1"><input type="checkbox" name="dow" value="4"> Qui</label>
                    <label class="flex items-center text-xs gap-1"><input type="checkbox" name="dow" value="5"> Sex</label>
                    <label class="flex items-center text-xs gap-1"><input type="checkbox" name="dow" value="6"> Sáb</label>
                </div>
            </form>
        </div>
    </header>

    <main class="container mx-auto p-4">
        <div class="flex justify-between items-center mb-4 no-print">
            <p class="text-sm text-gray-600 italic">* Clique na tarefa para excluir</p>
            <button onclick="window.print()" class="bg-gray-800 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-black transition">🖨️ IMPRIMIR CRONOGRAMA</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200">
            <div id="calendar"></div>
        </div>
    </main>

    <script>
        let calendar;
        const storageKey = 'vetmax_print_v1';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const savedData = JSON.parse(localStorage.getItem(storageKey)) || [];

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'pt-br',
                slotMinTime: '07:00:00',
                slotMaxTime: '21:00:00',
                allDaySlot: false,
                headerToolbar: { left: '', center: 'title', right: 'timeGridWeek,dayGridMonth' },
                buttonText: { week: 'Semana', month: 'Mês' },
                events: savedData,
                eventClick: function(info) {
                    if(confirm("Deseja remover esta tarefa do cronograma?")) {
                        info.event.remove();
                        save();
                    }
                }
            });
            calendar.render();
        });

        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const dows = Array.from(document.querySelectorAll('input[name="dow"]:checked')).map(el => el.value);
            
            const eventData = {
                id: Date.now().toString(),
                title: document.getElementById('title').value,
                startTime: document.getElementById('start').value,
                endTime: document.getElementById('end').value,
                backgroundColor: '#e2e8f0',
                textColor: '#1e293b',
                borderColor: '#94a3b8'
            };

            if(dows.length > 0) {
                eventData.daysOfWeek = dows;
            } else {
                // Se não marcar dia, coloca no dia de hoje
                const hoje = new Date().getDay();
                eventData.daysOfWeek = [hoje];
            }

            calendar.addEvent(eventData);
            save();
            this.reset();
        });

        function save() {
            const events = calendar.getEvents().map(e => ({
                id: e.id,
                title: e.title,
                startTime: e._def.recurringDef?.typeData?.startTime ? 
                           new Date(e._def.recurringDef.typeData.startTime.milliseconds).toISOString().substr(11, 5) : "08:00",
                endTime: e._def.recurringDef?.typeData?.endTime ? 
                         new Date(e._def.recurringDef.typeData.endTime.milliseconds).toISOString().substr(11, 5) : "09:00",
                daysOfWeek: e._def.recurringDef?.typeData?.daysOfWeek || null,
                backgroundColor: '#e2e8f0',
                textColor: '#1e293b'
            }));
            localStorage.setItem(storageKey, JSON.stringify(events));
        }
    </script>
</body>
</html>
